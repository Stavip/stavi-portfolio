<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard" style="padding:22px 28px">
  <div style="font-family:'Italiana',serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C;margin-bottom:14px">Buttons</div>
  <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
    <!-- Primary wine -->
    <button style="background:#7A1A1A;color:#FBF6EC;border:none;border-radius:999px;padding:12px 22px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;letter-spacing:.02em;box-shadow:0 2px 6px rgba(58,10,12,.18);cursor:pointer">Read the essay →</button>
    <!-- Primary hover -->
    <button style="background:#5C0F12;color:#FBF6EC;border:none;border-radius:999px;padding:12px 22px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;letter-spacing:.02em;box-shadow:0 4px 10px rgba(58,10,12,.22);cursor:pointer">Read the essay →</button>
    <!-- Secondary on cream -->
    <button style="background:#F7EFE0;color:#7A1A1A;border:1px solid rgba(122,26,26,.25);border-radius:999px;padding:11px 22px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;cursor:pointer">View one-pager</button>
    <!-- Tertiary text link -->
    <a style="color:#7A1A1A;font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;border-bottom:1px solid rgba(122,26,26,.4);padding-bottom:2px;cursor:pointer">Get in touch</a>
  </div>
  <div style="display:flex;gap:14px;align-items:center;margin-top:16px">
    <!-- Sm button -->
    <button style="background:#7A1A1A;color:#FBF6EC;border:none;border-radius:999px;padding:8px 16px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:500;letter-spacing:.02em;cursor:pointer">Small</button>
    <!-- icon -->
    <button style="background:#F7EFE0;color:#7A1A1A;border:1px solid rgba(122,26,26,.18);border-radius:50%;width:42px;height:42px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 17 17 7M9 7h8v8"/></svg></button>
    <!-- disabled -->
    <button disabled style="background:#D6C5AB;color:#8A7965;border:none;border-radius:999px;padding:12px 22px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;cursor:not-allowed">Disabled</button>
    <div style="font-family:var(--font-mono);font-size:10px;color:#5C4A3C;margin-left:auto">Sentence case · never ALL CAPS</div>
  </div>
</div>
</body></html>

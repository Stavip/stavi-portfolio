<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard" style="padding:20px 28px;min-height:280px">
  <div style="font-family:'Italiana',serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C;margin-bottom:12px">Card anatomy &middot; layered objects on taupe</div>
  <div style="position:relative;height:230px">
    <!-- Cream card behind, slight tilt -->
    <div style="position:absolute;left:30px;top:30px;width:260px;height:160px;background:#F7EFE0;border-radius:18px;box-shadow:0 2px 6px rgba(58,10,12,.08), 0 12px 24px rgba(58,10,12,.1);transform:rotate(-1.5deg);padding:18px 20px">
      <div style="font-family:'Italiana',serif;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C">About</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:#2A1F18;line-height:1.05;margin-top:6px">Two cities,<br>one practice.</div>
    </div>
    <!-- Wine card overlapping -->
    <div style="position:absolute;left:230px;top:60px;width:240px;height:150px;background:#7A1A1A;border-radius:22px;box-shadow:0 6px 12px rgba(58,10,12,.14), 0 22px 44px rgba(58,10,12,.2);padding:18px 20px;color:#FBF6EC">
      <div style="font-family:'Italiana',serif;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#D9A29C">Leadership</div>
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:400;line-height:1.3;margin-top:6px">"I lead by believing in people before they believe in themselves."</div>
    </div>
    <!-- Tiny circular avatar tucked at bottom -->
    <div style="position:absolute;left:200px;top:170px;width:56px;height:56px;background:#3A0A0C;border-radius:50%;box-shadow:0 4px 10px rgba(58,10,12,.18);border:3px solid #F7EFE0"></div>
    <!-- Label callout -->
    <div style="position:absolute;right:6px;bottom:6px;font-family:var(--font-mono);font-size:9px;color:#5C4A3C">
      r 18–28 · shadow-2/3 · -1.5° tilt
    </div>
  </div>
</div>
</body></html>

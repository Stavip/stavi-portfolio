<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard">
  <div class="dsstack" style="gap:10px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div style="background:#F7EFE0;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(58,10,12,.1)">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted)">--bg</div>
        <div style="font:500 14px var(--font-body);color:#2A1F18;margin-top:6px">Page bg</div>
        <div style="font:400 11px var(--font-mono);color:#5C4A3C">taupe-300</div>
      </div>
      <div style="background:#F7EFE0;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(58,10,12,.1)">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted)">--surface-card</div>
        <div style="font:500 14px var(--font-body);color:#2A1F18;margin-top:6px">Cream card</div>
        <div style="font:400 11px var(--font-mono);color:#5C4A3C">cream-100</div>
      </div>
      <div style="background:#7A1A1A;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(58,10,12,.1)">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#D9A29C">--bg-accent</div>
        <div style="font:500 14px var(--font-body);color:#FBF6EC;margin-top:6px">Wine card</div>
        <div style="font:400 11px var(--font-mono);color:#F3E2DE">wine-500</div>
      </div>
      <div style="background:#F0E6D2;border-radius:14px;padding:14px">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted)">--fg</div>
        <div style="font:500 14px var(--font-body);color:#2A1F18;margin-top:6px">Ink primary</div>
        <div style="font:400 11px var(--font-mono);color:#5C4A3C">ink-900</div>
      </div>
      <div style="background:#F0E6D2;border-radius:14px;padding:14px">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted)">--fg-muted</div>
        <div style="font:500 14px var(--font-body);color:#5C4A3C;margin-top:6px">Ink muted</div>
        <div style="font:400 11px var(--font-mono);color:#5C4A3C">ink-500</div>
      </div>
      <div style="background:#F0E6D2;border-radius:14px;padding:14px;border:1px dashed rgba(176,138,74,.6)">
        <div style="font-family:var(--font-body);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#B08A4A">--gold-500</div>
        <div style="font:500 14px var(--font-body);color:#8A6A33;margin-top:6px">Gold leaf · rare</div>
        <div style="font:400 11px var(--font-mono);color:#5C4A3C">use sparingly</div>
      </div>
    </div>
  </div>
</div>
</body></html>

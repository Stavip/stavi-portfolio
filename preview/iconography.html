<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="dscard" style="padding:22px 28px">
  <div style="font-family:'Italiana',serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C;margin-bottom:14px">Iconography &middot; Lucide &middot; 1.5px stroke &middot; currentColor</div>
  <div style="display:flex;flex-wrap:wrap;gap:22px;align-items:center;color:#2A1F18">
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="mail" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">mail</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="arrow-up-right" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">arrow-ur</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="external-link" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">ext-link</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="file-text" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">file-text</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="download" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">download</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="link" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">link</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="map-pin" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">map-pin</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="quote" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">quote</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="chevron-down" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">chevron</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="menu" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">menu</div></div>
    <div style="text-align:center;font:400 10px var(--font-mono);color:#5C4A3C"><i data-lucide="x" style="width:24px;height:24px;color:#2A1F18"></i><div style="margin-top:4px">x</div></div>
  </div>
  <div style="margin-top:14px;font:400 11px var(--font-body);color:#5C4A3C;font-style:italic">No emoji. No icon fonts. SVG only.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard" style="padding:22px 28px">
  <div style="font-family:'Italiana',serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C;margin-bottom:14px">Form fields — single-line, underline-only</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px 22px">
    <!-- Empty -->
    <div>
      <div style="font:500 10px var(--font-body);color:#5C4A3C;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px">Your name</div>
      <input placeholder="Eleanor M." style="width:100%;background:transparent;border:none;border-bottom:1px solid rgba(94,71,51,.3);font:400 16px var(--font-body);color:#2A1F18;padding:6px 0;outline:none">
    </div>
    <!-- Filled -->
    <div>
      <div style="font:500 10px var(--font-body);color:#5C4A3C;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px">Email</div>
      <input value="eleanor@example.com" style="width:100%;background:transparent;border:none;border-bottom:1px solid rgba(94,71,51,.3);font:400 16px var(--font-body);color:#2A1F18;padding:6px 0;outline:none">
    </div>
    <!-- Focused -->
    <div>
      <div style="font:500 10px var(--font-body);color:#7A1A1A;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px">Message</div>
      <input value="A note about your essay…" style="width:100%;background:transparent;border:none;border-bottom:2px solid #7A1A1A;font:400 16px var(--font-body);color:#2A1F18;padding:6px 0;outline:none">
    </div>
    <!-- Error -->
    <div>
      <div style="font:500 10px var(--font-body);color:#A24043;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px">Subject</div>
      <input value="" style="width:100%;background:transparent;border:none;border-bottom:1px solid #A24043;font:400 16px var(--font-body);color:#2A1F18;padding:6px 0;outline:none">
      <div style="font:italic 400 12px 'Cormorant Garamond',serif;color:#A24043;margin-top:4px">Required.</div>
    </div>
  </div>
</div>
</body></html>

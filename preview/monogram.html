<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard" style="padding:22px 28px">
  <div style="display:flex;align-items:center;gap:30px">
    <!-- Big monogram on wine -->
    <div style="width:120px;height:120px;background:#7A1A1A;border-radius:24px;box-shadow:0 8px 18px rgba(58,10,12,.18);display:flex;align-items:center;justify-content:center;color:#FBF6EC">
      <svg width="78" height="78" viewBox="0 0 200 200" fill="none">
        <text x="100" y="135" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="155" font-style="italic" font-weight="500" fill="currentColor" letter-spacing="-6">SP</text>
      </svg>
    </div>
    <!-- Small variations -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:42px;height:42px;background:#7A1A1A;color:#FBF6EC;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:22px">SP</div>
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:26px;color:#2A1F18">SP <span style="font-style:normal;font-weight:400;color:#5C4A3C;font-size:14px;font-family:'Manrope',sans-serif;margin-left:6px">Stavroula Papadaki</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:28px;height:28px;background:transparent;color:#7A1A1A;border:1.5px solid #7A1A1A;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:15px">SP</div>
        <div style="font:500 10px var(--font-body);color:#5C4A3C;letter-spacing:.18em;text-transform:uppercase">Footer mark, outlined</div>
      </div>
      <div style="font:400 11px var(--font-mono);color:#5C4A3C;margin-top:4px">Cormorant Garamond Italic · 500</div>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="dscard" style="padding:18px 28px">
  <div style="font-family:'Italiana',serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#5C4A3C;margin-bottom:14px">Navigation &middot; capsule, backdrop-blurred</div>
  <!-- Nav capsule -->
  <div style="background:rgba(247,239,224,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:999px;padding:10px 14px 10px 18px;display:flex;align-items:center;gap:18px;box-shadow:0 4px 12px rgba(58,10,12,.12);max-width:580px">
    <!-- Monogram -->
    <div style="width:30px;height:30px;background:#7A1A1A;color:#FBF6EC;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:16px">SP</div>
    <div style="display:flex;gap:18px;font-family:'Manrope',sans-serif;font-size:13px;color:#2A1F18">
      <span style="border-bottom:1px solid #7A1A1A;padding-bottom:2px;color:#7A1A1A">Home</span>
      <span style="cursor:pointer">About</span>
      <span style="cursor:pointer">Leadership</span>
      <span style="cursor:pointer">Work</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button style="background:#7A1A1A;color:#FBF6EC;border:none;border-radius:999px;padding:7px 14px;font:500 12px 'Manrope',sans-serif;cursor:pointer">Get in touch</button>
    </div>
  </div>
  <div style="font:400 11px var(--font-mono);color:#5C4A3C;margin-top:10px">Four section links &middot; CTA doubles as Contact</div>
</div>
</body></html>
